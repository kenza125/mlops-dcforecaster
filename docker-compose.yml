version: "3.9"

services:
  minio:
    image: minio/minio:latest
    container_name: dcforecaster-minio
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: dcforecaster-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb -p local/mlflow-artifacts;
      exit 0;
      "

  api:
    build: .
    container_name: dcforecaster-api
    ports:
      - "8000:8000"
    volumes:
      - ./history.csv:/app/history.csv
      - ./predictions_log.csv:/app/predictions_log.csv
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-ui:5000
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
    depends_on:
      - mlflow-ui
    restart: unless-stopped

  mlflow-ui:
    build: .
    container_name: dcforecaster-mlflow-ui
    command: >
      mlflow server
      --backend-store-uri sqlite:////app/mlflow_data/mlflow.db
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/app/mlflow_data
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin123
    depends_on:
      - minio
    restart: unless-stopped

volumes:
  minio_data: