version: "3.9"

services:
  api:
    build: .
    container_name: dcforecaster-api
    ports:
      - "8000:8000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./history.csv:/app/history.csv
      - ./predictions_log.csv:/app/predictions_log.csv
    environment:
      - MLFLOW_TRACKING_URI=file:./mlruns
    restart: unless-stopped

  mlflow-ui:
    build: .
    container_name: dcforecaster-mlflow-ui
    command: ["mlflow", "ui", "--backend-store-uri", "file:./mlruns", "--host", "0.0.0.0", "--port", "5000"]
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
    restart: unless-stopped